<!DOCTYPE html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>جستجوی کلمات</title>
        <link rel="stylesheet" href="https://lib.arvancloud.ir/vazir-font/33.003/Farsi-Digits-Non-Latin/Vazirmatn-FD-NL-font-face.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
<body>
    <main class="page-shell">
        <header class="page-header">
            <h1>جستجوگر کلمات فارسی</h1>
            <p class="warning-box">⚠️ امکان وجود کلمات نامربوط و غلط در نتایج وجود دارد</p>
        </header>

        <section class="search-panel" aria-label="فیلترهای جستجو">
            <div class="search-box">
                <label class="field">
                    <span>حروف</span>
                    <input type="text" id="lettersInput" placeholder="مثال: برذال" autocomplete="off">
                </label>
                <label class="field">
                    <span>طول کلمه</span>
                    <input type="number" id="lengthInput" placeholder="مثال: ۵" min="1" inputmode="numeric">
                </label>
                <label class="field">
                    <span>دسته‌بندی</span>
                    <select id="categorySelect">
                        {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </label>
            </div>
        </section>

        <div id="lang-warning" class="warning-box" hidden>✋ کیبورد شما باید فارسی باشد!</div>
        <div id="loading" class="loading-state" role="status" aria-live="polite" hidden>
            <span class="spinner" aria-hidden="true"></span>
            <span>در حال جستجو...</span>
        </div>
        <div class="timing" id="timing" aria-live="polite"></div>
        <div id="error-box" class="error-box" role="alert"></div>
        <ul id="results" aria-live="polite"></ul>
    </main>

    <a id="helpButton" href="/help">راهنما</a>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
