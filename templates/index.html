<!DOCTYPE html>
<html lang="fa" dir="rtl">
    <head>
    <meta charset="UTF-8">
    <title>جستجوی کلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const lettersInput  = document.getElementById("lettersInput");
        const lengthInput   = document.getElementById("lengthInput");
        const categorySelect= document.getElementById("categorySelect");
        const resultsList   = document.getElementById("results");
        const timingEl      = document.getElementById("timing");
        const langWarning = document.getElementById("lang-warning");
        const errBox        = document.getElementById("error-box");

        let debounceTimer = null;

        // Filters non-Persian characters from the input
        const allowOnlyPersian = (el) => {
            // Check if there are any non-Persian characters
            if (/[^آ-یٔ‌ء‍]/.test(el.value)) {
                langWarning.style.display = "block";
            } else {
                langWarning.style.display = "none";
            }

            // Sanitize the value to only Persian characters
            el.value = el.value.replace(/[^آ-یٔ‌ء‍]/g, ""); 
        };

        // Executes the search request
        const runSearch = () => {
            // Remove pulse effect from all fields
            document.querySelectorAll(".pulse-effect").forEach(el => {
                el.classList.remove("pulse-effect");
            });

            const queryParams = {
                letters:  lettersInput.value.trim(),
                length:   lengthInput.value.trim(),
                category: categorySelect.value.trim()
            };

            fetch(`/search?${new URLSearchParams(queryParams)}`)
                .then(res => res.json())
                .then(data => {
                    // Reset UI
                    errBox.textContent = "";
                    resultsList.innerHTML = "";
                    timingEl.textContent = "";

                    // Handle errors
                    if (data.error) {
                        errBox.textContent = data.error;

                        if (Array.isArray(data.fields)) {
                            data.fields.forEach(id => {
                                const el = document.getElementById(id);
                                if (el) el.classList.add("pulse-effect");
                            });

                            if (data.fields[0]) {
                                const firstEl = document.getElementById(data.fields[0]);
                                if (firstEl) firstEl.focus();
                            }
                        }
                        return;
                    }

                    // Append results
                    data.results.forEach((word, index) => {
                        const li = document.createElement("li");
                        li.textContent = word;
                        li.style.setProperty("--delay", index);
                        resultsList.appendChild(li);
                    });

                    // Show timing and count
                    if (data.server_ms !== undefined) {
                        let text = `زمان جستجو : ${data.server_ms} میلی‌ثانیه`;
                        if (data.count !== undefined) {
                            text += ` - تعداد نتایج: ${data.count}`;
                        }
                        timingEl.textContent = text;
                    }
                })
                .catch(err => {
                    errBox.textContent = "خطا در دریافت پاسخ از سرور";
                    console.error(err);
                });
        };

        // Debounces the search trigger
        const scheduleSearch = () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(runSearch, 300);
        };

        // Event listeners
        lettersInput.addEventListener("input", () => {
            allowOnlyPersian(lettersInput);
            langWarning.style.display === "none" && scheduleSearch();
        });
        lengthInput.addEventListener("input", scheduleSearch);
        categorySelect.addEventListener("change", scheduleSearch);
    });
    </script>
    </head>
<body>
    <h2>جستجوگر کلمات فارسی</h2>
    <div class="warning-box">⚠️ امکان وجود کلمات نامربوط در نتایج وجود دارد</div>
    <div class="search-box">
        <input type="text" id="lettersInput" placeholder="حروف: مثل بامکر">
        <input type="number" id="lengthInput" placeholder="طول کلمه">
        <select id="categorySelect">
            {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
        </select>
    </div>
    <div id="lang-warning" class="warning-box" style="display: none;">✋ کیبورد شما باید فارسی باشد!</div>
    <div class="timing" id="timing"></div>
    <div id="error-box" class="error-box"></div>
    <ul id="results"></ul>
</body>
</html>
